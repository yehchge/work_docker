ServerRoot "/usr/local/apache2"
Listen 80

# 伺服器管理與路徑
#ServerAdmin admin@localhost

# 修正 AH00558
ServerName localhost:8080

# --- 核心模組載入 (解決 AH00534: No MPM loaded) ---
LoadModule mpm_event_module modules/mod_mpm_event.so

# --- 解決 .htaccess 中 'deny', 'allow' 錯誤的關鍵 ---
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule access_compat_module modules/mod_access_compat.so

# --- 解決 Require 指令報錯的關鍵 ---
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authn_core_module modules/mod_authn_core.so

# --- 支援目錄清單 ---
LoadModule dir_module modules/mod_dir.so

# 支援 IndexIgnore
LoadModule autoindex_module modules/mod_autoindex.so

# --- 確保支援 Rewrite (許多 PHP 框架需要) ---
LoadModule rewrite_module modules/mod_rewrite.so

# 同時確保這幾個模組也開啟，以便支援 PHP-FPM 反向代理
LoadModule unixd_module modules/mod_unixd.so
LoadModule log_config_module modules/mod_log_config.so

# 讓 Apache 也能處理 PHP (轉發給 php-fpm 容器)
LoadModule proxy_module modules/mod_proxy.so

# 處理 `File not found`
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so

LoadModule alias_module modules/mod_alias.so

LoadModule headers_module modules/mod_headers.so

LoadModule include_module modules/mod_include.so

# 運行權限
User daemon
Group daemon

# 專案目錄設定
DocumentRoot "/var/www/html"
<Directory "/var/www/html">
    Options +Indexes +FollowSymLinks +Includes
    AllowOverride All
    Require all granted

    # 關鍵：必須加上 SuppressHTMLPreamble
    IndexOptions +FancyIndexing +HTMLTable +VersionSort +FoldersFirst \
                 +NameWidth=* +Charset=UTF-8 +SuppressHTMLPreamble

    IndexIgnore header.html footer.html .htaccess .??* *~ *# .DS_Store

    # Header / Footer
    HeaderName header.shtml
    #IndexHeadInsert "/header.html"
    ReadmeName footer.shtml

    IndexStyleSheet style.css

    <FilesMatch "^(header|footer|style)\.shtml?$">
        Require all granted
    </FilesMatch>
</Directory>

# 串接 PHP-FPM
#ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php-fpm:9000/var/www/html/$1

# 修正後的 PHP-FPM 轉發語法
<FilesMatch \.php$>
    SetHandler "proxy:fcgi://php-fpm:9000"
</FilesMatch>

# 預設索檔案
DirectoryIndex index.php index.html

# 輸出日誌到 Docker 標準輸出
# 將日誌導向到標準輸出，避免容器因權限無法寫入檔案而崩潰
ErrorLog /proc/self/fd/2
LogFormat "%h %l %u %t \"%r\" %>s %b" common
CustomLog /proc/self/fd/1 common