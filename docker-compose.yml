services:

  # PHP-FPM 處理器 (共用)
  php-fpm:
    container_name: php-fpm
    #image: php:${PHP_VERSION}
    build:
      context: ./php
      args:
        PHP_VERSION: ${PHP_VERSION}
    volumes:
      - ${PROJECTS_ROOT}:/var/www/html
    networks:
      - app_net

  # Nginx 服務獨立運作 (作為主要 Web Server, Port 80)
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ${PROJECTS_ROOT}:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/header.html:/var/www/html/header.html
      - ./nginx/footer.html:/var/www/html/footer.html
      - ./nginx/.autoindex.css:/var/www/html/.autoindex.css
      - ./nginx/.autoindex.js:/var/www/html/.autoindex.js
    # depends_on:
    #   - php-fpm
    networks:
      - app_net

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:0.10
    container_name: nginx-prometheus-exporter
    command: -nginx.scrape-uri http://nginx/stub_status
    ports:
      - 9113:9113
    depends_on:
      - nginx
    networks:
      - app_net

  # Apache - 獨立運作 (Port 8080)
  apache:
    container_name: apache
    image: httpd:2.4-alpine
    # image: httpd:2.4
    ports:
      - "8080:80"
    volumes:
      - ${PROJECTS_ROOT}:/var/www/html
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./apache/.htaccess:/var/www/html/.htaccess
      - ./apache/header.html:/var/www/html/header.html
      - ./apache/footer.html:/var/www/html/footer.html
      - ./apache/style.css:/var/www/html/style.css
    networks:
      - app_net
  
  # 動態切換 MySQL / MariaDB 資料庫
  mysql:
    container_name: mysql
    image: ${DB_IMAGE}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - ${DATABASE_ROOT}:/var/lib/mysql
    networks:
      - app_net

  # Portainer (Web 管理界面)
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    # image: portainer/portainer-ce:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/portainer_data:/data
    ports:
      - "9443:9443"

